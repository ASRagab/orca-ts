name: Docs

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build And Publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install docs dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run docs:site:build

      - name: Publish docs branch
        env:
          PAGES_WORKTREE: ${{ runner.temp }}/gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:refs/remotes/origin/gh-pages --depth=1
          git worktree add "$PAGES_WORKTREE" origin/gh-pages
          find "$PAGES_WORKTREE" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R website/dist/. "$PAGES_WORKTREE"/
          touch "$PAGES_WORKTREE/.nojekyll"
          cd "$PAGES_WORKTREE"
          git add -A
          if git diff --cached --quiet; then
            echo "No docs changes to publish."
          else
            git commit -m "Deploy documentation website"
            git push origin HEAD:gh-pages
          fi
