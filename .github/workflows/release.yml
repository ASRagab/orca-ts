name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag matches package version
        run: |
          PKG="v$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test "$PKG" = "$GITHUB_REF_NAME" || { echo "tag $GITHUB_REF_NAME != package.json $PKG"; exit 1; }

      - name: Run verification
        run: bun run verify

  release-binaries:
    name: Release binaries
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release binaries
        run: bun run build:release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/release/*.tar.gz dist/release/SHA256SUMS.txt install.sh --title "$GITHUB_REF_NAME" --generate-notes
