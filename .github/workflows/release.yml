name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag matches package version
        run: |
          PKG="v$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test "$PKG" = "$GITHUB_REF_NAME" || { echo "tag $GITHUB_REF_NAME != package.json $PKG"; exit 1; }

      - name: Run verification
        run: bun run verify

  release-binaries:
    name: Release binaries
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag matches package version
        run: |
          PKG="v$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test "$PKG" = "$GITHUB_REF_NAME" || { echo "tag $GITHUB_REF_NAME != package.json $PKG"; exit 1; }

      - name: Build release binaries
        run: bun run build:release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/release/*.tar.gz dist/release/SHA256SUMS.txt install.sh --title "$GITHUB_REF_NAME" --generate-notes

  publish-npm:
    name: Publish npm package
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag matches package version
        run: |
          PKG="v$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test "$PKG" = "$GITHUB_REF_NAME" || { echo "tag $GITHUB_REF_NAME != package.json $PKG"; exit 1; }

      - name: Check npm supports Trusted Publishing
        run: |
          npm --version
          node -e 'const v=require("child_process").execFileSync("npm",["--version"],{encoding:"utf8"}).trim().split(".").map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error("npm 11.5.1 or newer is required for Trusted Publishing"); }'

      - name: Smoke npm package
        run: bun run smoke:package

      - name: Publish npm package
        run: npm publish --access public
